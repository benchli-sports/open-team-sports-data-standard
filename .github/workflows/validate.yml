name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    name: Validate examples against schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test
